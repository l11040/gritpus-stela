services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command: ["mysqld", "--default-time-zone=+09:00"]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-gritpus}
      MYSQL_USER: ${DB_USERNAME:-gritpus}
      MYSQL_PASSWORD: ${DB_PASSWORD:-gritpuspassword}
      TZ: Asia/Seoul
    ports:
      - "50003:3306"
    volumes:
      - mysql-data-dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data-dev:
