services:
  traefik:
    image: traefik:v3.6.1
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.routers.dashboard.service=api@internal"

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command: ["mysqld", "--default-time-zone=+09:00"]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  desktop:
    build:
      context: ..
      dockerfile: infra/Dockerfile.desktop
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 50004
    volumes:
      - ~/.claude:/root/.claude
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:50004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  server:
    build:
      context: ..
      dockerfile: infra/Dockerfile.server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 50002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: http://${DOMAIN}
      DESKTOP_SERVICE_URL: http://desktop:50004
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      desktop:
        condition: service_healthy
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.server.entrypoints=web"
      - "traefik.http.routers.server.middlewares=strip-api"
      - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"
      - "traefik.http.services.server.loadbalancer.server.port=50002"
      - "traefik.docker.network=traefik-public"

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: /api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - server
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.services.web.loadbalancer.server.port=50001"

volumes:
  mysql-data:
  uploads-data:

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge
